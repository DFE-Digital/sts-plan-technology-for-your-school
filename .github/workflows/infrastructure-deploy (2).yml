name: Infrastructure Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'The environment to run infrastructure deployment on:'
        required: true
        options: ['Dev', 'Tst', 'StagingUnprotected', 'ProductionUnprotected']
      is_dr:
        type: boolean
        default: false
        description: 'flag for using disaster recovery: adds -dr to all resource names'

env:
  IS_DR: ${{ github.event_name == 'workflow_dispatch' && inputs.is_dr || false }}
  ENVIRONMENT_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'Dev' }}
  #containers in the TF storage acc
  TF_BACKEND_CONTAINER_NAME: tfstate
  #tf state files in the TF storage acc
  TF_BACKEND_KEY_APP: app.tfstate
  TF_BACKEND_KEY_DNS: dns.tfstate
  #containers in the backup storage acc (not created here; assumed to already exist)
  BACKUP_CONTAINER_NAME: sqlbackups
  #solution folders for terraform files
  TF_WORKING_DIRECTORY_APP: terraform/container-app
  TF_WORKING_DIRECTORY_DNS: terraform/dns-zone
  #sql restore optional vars
  SQL_BACKUP_FILE_NAME: '' #can specify specific file, but not necessary
  SQL_BACKUP_FILE_NAME_SEARCH: '' #can specify a file name search term, but not necessary
  USE_LATEST_IF_NOT_SPECIFIED: true

jobs:
  prepare-variables:
    name: Prepare derived variables
    environment:
      name: ${{ env.ENVIRONMENT_NAME }}
    runs-on: ubuntu-latest
    outputs:
      RESOURCE_PREFIX_BACKUP: ${{ steps.set-vars.outputs.RESOURCE_PREFIX_BACKUP }}
      RESOURCE_PREFIX_TF: ${{ steps.set-vars.outputs.RESOURCE_PREFIX_TF }}
      RESOURCE_PREFIX_APP: ${{ steps.set-vars.outputs.RESOURCE_PREFIX_APP }}
      RESOURCE_PREFIX_BACKUP_SHORT: ${{ steps.set-vars.outputs.RESOURCE_PREFIX_BACKUP_SHORT }}
      RESOURCE_PREFIX_TF_SHORT: ${{ steps.set-vars.outputs.RESOURCE_PREFIX_TF_SHORT }}
      RESOURCE_PREFIX_APP_SHORT: ${{ steps.set-vars.outputs.RESOURCE_PREFIX_APP_SHORT }}
      
    steps:
      - name: Prepare derived variables
        id: set-vars
        shell: bash
        run: |
          RESOURCE_PREFIX_BACKUP = "${secrets.AZ_ENVIRONMENT}${secrets.DFE_PROJECT_NAME}-backup"
          RESOURCE_PREFIX_TF = "${secrets.AZ_ENVIRONMENT}${secrets.DFE_PROJECT_NAME}-tf"
          RESOURCE_PREFIX_APP = "${secrets.AZ_ENVIRONMENT}${secrets.DFE_PROJECT_NAME}"

          RESOURCE_PREFIX_BACKUP = "${{ env.IS_DR == 'true' && format('{0}-dr', RESOURCE_PREFIX_BACKUP) || $RESOURCE_PREFIX_BACKUP }}"
          RESOURCE_PREFIX_TF = "${{ env.IS_DR == 'true' && format('{0}-dr', RESOURCE_PREFIX_TF) || $RESOURCE_PREFIX_TF }}"
          RESOURCE_PREFIX_APP = "${{ env.IS_DR == 'true' && format('{0}-dr', RESOURCE_PREFIX_APP) || $RESOURCE_PREFIX_APP }}"

          RESOURCE_PREFIX_BACKUP_SHORT = "${RESOURCE_PREFIX_BACKUP//-/}"
          RESOURCE_PREFIX_TF_SHORT = "${RESOURCE_PREFIX_TF//-/}"
          RESOURCE_PREFIX_APP_SHORT = "${RESOURCE_PREFIX_APP//-/}"

          echo "RESOURCE_PREFIX_BACKUP=$RESOURCE_PREFIX_BACKUP" >> "$GITHUB_OUTPUT"
          echo "RESOURCE_PREFIX_TF=$RESOURCE_PREFIX_TF" >> "$GITHUB_OUTPUT"
          echo "RESOURCE_PREFIX_APP=$RESOURCE_PREFIX_APP" >> "$GITHUB_OUTPUT"
          echo "RESOURCE_PREFIX_BACKUP_SHORT=$RESOURCE_PREFIX_BACKUP_SHORT" >> "$GITHUB_OUTPUT"
          echo "RESOURCE_PREFIX_TF_SHORT=$RESOURCE_PREFIX_TF_SHORT" >> "$GITHUB_OUTPUT"
          echo "RESOURCE_PREFIX_APP_SHORT=$RESOURCE_PREFIX_APP_SHORT" >> "$GITHUB_OUTPUT"


  deploy-tf-resources:
    name: Prepare derived variables
    needs: set-vars
    environment:
      name: ${{ env.ENVIRONMENT_NAME }}
    runs-on: ubuntu-latest
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.7

      - name: Login with AZ
        uses: ./.github/actions/azure-login
        with:
          az_tenant_id: ${{ secrets.az_tenant_id }}
          az_subscription_id: ${{ secrets.az_subscription_id }}
          az_client_id: ${{ secrets.az_client_id }}

      - name: Deploy TF Resources
        uses: ./.github/actions/deploy-tf-resources
        with:
          environment: ${{ env.ENVIRONMENT_NAME }}
          az_location: ${{ vars.AZ_LOCATION }}
          tf_backend_resource_group: ${{ needs.set-vars.outputs.RESOURCE_PREFIX_TF }}
          tf_container_name: ${{ env.TF_BACKEND_CONTAINER_NAME }} #multiple?
          tf_storage_acc_name: ${{ needs.set-vars.outputs.RESOURCE_PREFIX_TF_SHORT }}
          tf_keyvault_name: ${{ needs.set-vars.outputs.RESOURCE_PREFIX_TF_SHORT }}
          az_object_id: ${{ secrets.AZ_OBJECT_ID }}
 #do we want to try save the tfvars into the keyvault from backup or soemthing? or just pause here to add manually
  deploy-app:
    name: Prepare derived variables
    needs: [set-vars,deploy-tf-resources]
    environment:
      name: ${{ env.ENVIRONMENT_NAME }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{env.TF_WORKING_DIRECTORY_APP}}
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.7

      - name: Login with AZ
        uses: ./.github/actions/azure-login
        with:
          az_tenant_id: ${{ secrets.az_tenant_id }}
          az_subscription_id: ${{ secrets.az_subscription_id }}
          az_client_id: ${{ secrets.az_client_id }}
          #whitelist
          #maybe use drews?
      - name: Whitelist Runner for Storage account, KeyVault, and TF KeyVault Remove
        uses: ./.github/actions/whitelisting-for-runner
        with:
          runner-ip: ${{ steps.whats-my-ip.outputs.ip }}
          tf-backend-resource-group: ${{ needs.setup.outputs.tf_backend_rg_name }}
          tf-secrets-keyvault-name: ${{ needs.setup.outputs.tf_kv_name }} #fix
          removeRules: 'false'

      - name: Get secret and clean tfvars file (PowerShell)
        shell: pwsh
        run: |
          ./scripts-workflow/get-and-normalise-tfvars.ps1 `
            -SecretName "${{ secrets.TF_SECRET_NAME }}" `
            -KeyVaultName "${{ needs.setup.outputs.tf_kv_name }}" #fix

      - name: Terraform init
        id: init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ needs.setup.outputs.tf_backend_rg_name }}"  \
            -backend-config="storage_account_name=${{ needs.setup.outputs.tf_backend_storage_account_name }}"  \
            -backend-config="container_name=${{ env.TF_BACKEND_CONTAINER_NAME }}"
#remember project name and environment can also be in the tfvars, we should override those...
      - name: Apply Terraform changes - container registry only
        id: apply-acr
        run: terraform apply -target=azurerm_resource_group.app_rg -target=azurerm_container_registry.acr_notshared -var-file="normalisedTerraformVars.tfvars" -auto-approve     
        #use tfvars or specify names? might need have to be tfvars unless moved into own folder

      - name: Promote Image
        id: promote_image
        uses: ./.github/actions/promote-image
        with:
          image_branch: ${{ env.ENVIRONMENT_NAME == 'ProductionUnprotected' && 'main' || 'development' }}
          acr_name: ${{ needs.setup.outputs.RESOURCE_PREFIX_APP_SHORT }}
          acr_login_server: ${{ needs.setup.outputs.RESOURCE_PREFIX_APP_SHORT }}.azurecr.io
          package_name: ${{ env.PACKAGE_NAME }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output: ${{ steps.promote_image.outputs.image_tag }} #confirm
          #consider the waf thing. is this a flag chnage and removal of the waf file - or what is the manual change
 #remember project name and environment can also be in the tfvars, we should override those...
      - name: Apply Terraform changes
        id: apply
        run: terraform apply -var-file="normalisedTerraformVars.tfvars" -var="image_tag=${{steps.promote_image.outputs.image_tag}}" -var="workflow_runner_ip=${{ env.TF_VAR_github_ip }}" -auto-approve

      - name: Restore DB from BACPAC
        uses: ./.github/actions/restore-db-from-bacpac
        with:
          resource_group: ${{ needs.setup.outputs.RESOURCE_PREFIX_BACKUP }}
          sql_server_name: ${{ needs.setup.outputs.RESOURCE_PREFIX_APP_SHORT }}
          target_database: ${{ needs.setup.outputs.RESOURCE_PREFIX_APP_SHORT }}-sqldb
          storage_account: ${{ needs.setup.outputs.RESOURCE_PREFIX_BACKUP_SHORT }}
          container_name: ${{ env.BACKUP_CONTAINER_NAME }}
          bacpac_file: ${{ env.SQL_BACKUP_FILE_NAME }}
          bacpac_prefix: ${{ env.SQL_BACKUP_FILE_NAME_SEARCH }}
          use_latest_if_not_specified: ${{ env.USE_LATEST_IF_NOT_SPECIFIED }}

          #dns?
