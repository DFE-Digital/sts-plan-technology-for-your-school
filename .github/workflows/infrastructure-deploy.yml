name: Infrastructure Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'The environment to run infrastructure deployment on:'
        required: true
        options: ['Dev', 'Tst', 'StagingUnprotected', 'ProductionUnprotected']
      is_dr:
        type: boolean
        default: false
        description: 'flag for using disaster recovery: adds -dr to all resource names'

env:
  IS_DR: ${{ github.event_name == 'workflow_dispatch' && inputs.is_dr || true }}
  ENVIRONMENT_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'Dev' }}
  ARM_USE_OIDC: true
  TF_BACKEND_CONTAINER_NAME: tfstate
  TF_BACKEND_KEY: terraform.tfstate
  
  DOTNET_VERSION: ${{ vars.DOTNET_VERSION }}

  ARM_TENANT_ID: ${{ secrets.AZ_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZ_SUBSCRIPTION_ID }}
  ARM_CLIENT_ID: ${{ secrets.AZ_CLIENT_ID }}

  TF_WORKING_DIRECTORY: terraform/container-app

jobs:
  deploy-app-rg-and-image:
    uses: ./.github/workflows/image-deploy-only.yml
    with:
      environment: ${{ inputs.environment == 'ProductionUnprotected' && 'main' || 'development' }}
      is_dr: ${{ env.IS_DR }}
    secrets: inherit

  deploy-terraform:
    permissions:
      id-token: write
      contents: read
    needs: [deploy-app-rg-and-image]
    name: Deploy Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{env.TF_WORKING_DIRECTORY}}
    environment: ${{ inputs.environment }}
    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.7

      - name: Login with AZ
        uses: ./.github/actions/azure-login
        with:
          az_tenant_id: ${{ secrets.AZ_TENANT_ID }}
          az_subscription_id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          az_client_id: ${{ secrets.AZ_CLIENT_ID }}

      - name: Replace in secret environment variable
        run: |
          AZ_SA_COSTING_NAME="${{ env.AZ_SA_COSTING_NAME }}"
          SA_COSTING_NAME="${AZ_SA_COSTING_NAME//-/}"
          echo "SA_COSTING_NAME=$SA_COSTING_NAME" >> $GITHUB_ENV

      - name: Whitelist Runner for Storage account, KeyVault, and TF KeyVault Remove
        uses: ./.github/actions/whitelisting-for-runner
        with:
          runner-ip: ${{ steps.whats-my-ip.outputs.ip }}
          tf-backend-resource-group: ${{ needs.setup.outputs.tf_backend_rg_name }}
          tf-secrets-keyvault-name: ${{ needs.setup.outputs.tf_kv_name }}
          removeRules: 'false'

      - name: Set container app image_tag env variables
        run: |
          IMAGE_TAG=$(az acr repository show-tags -n ${{ secrets.AZ_ACR_URL }} --repository plan-tech-app --top 1 --orderby time_desc |  jq '.[]' | tr -d "\"")
          echo "TF_VAR_image_tag=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Terraform init
        id: init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ needs.setup.outputs.tf_backend_rg_name }}"  \
            -backend-config="storage_account_name=${{ needs.setup.outputs.tf_backend_storage_account_name }}"  \
            -backend-config="container_name=${{ env.TF_BACKEND_CONTAINER_NAME }}"

      - name: Get secret and clean tfvars file (PowerShell)
        shell: pwsh
        run: |
          ./scripts-workflow/get-and-normalise-tfvars.ps1 `
            -SecretName "${{ secrets.TF_SECRET_NAME }}" `
            -KeyVaultName "${{ needs.setup.outputs.tf_kv_name }}"

      - name: Apply Terraform changes - container registry only
        id: apply-acr
        run: terraform apply -target=azurerm_container_registry.acr -var-file="normalisedTerraformVars.tfvars" -auto-approve

      - name: Apply Terraform changes
        id: apply
        run: terraform apply -var-file="normalisedTerraformVars.tfvars" -var="image_tag=$TF_VAR_image_tag" -var="workflow_runner_ip=${{ env.TF_VAR_github_ip }}" -auto-approve

      - name: Delete generated files
        shell: pwsh
        run: |
          ./scripts-workflow/remove-generated-files.ps1

      - name: Whitelist Runner for Storage account, KeyVault, and TF KeyVault Remove
        uses: ./.github/actions/whitelisting-for-runner
        with:
          runner-ip: ${{ steps.whats-my-ip.outputs.ip }}
          tf-backend-resource-group: ${{ needs.setup.outputs.tf_backend_rg_name }}
          tf-secrets-keyvault-name: ${{ needs.setup.outputs.tf_kv_name }}
          removeRules: 'true'

  # ensure storage details match those from the backup process in back-up-database.yml and db/server name match
  restore-db:
    needs: [setup, terraform-deploy]
    uses: ./.github/workflows/restore-azure-sql-from-bacpac.yml
    with:
      resource_group: ${{ needs.prepare.outputs.app_rg_name }}
      sql_server_name: ${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}.database.windows.net
      target_database: ${{ needs.prepare.outputs.app_rg_name }}-sqldb
      storage_account: plantechsqlbackups
      container_name: sqlbackups
    secrets:
      az_tenant_id: ${{ secrets.AZ_TENANT_ID }}
      az_subscription_id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
      az_client_id: ${{ secrets.AZ_CLIENT_ID }}
