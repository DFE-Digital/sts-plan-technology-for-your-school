name: Mutations testing
on:
  push:
    branches: ["main", "development"]
    paths:
      - "src/**"
      - "tests/**"
  pull_request:

concurrency:
  group: "${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  mutations-testing:
    name: Run mutations testing
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Stryker tool
        run: dotnet tool install -g dotnet-stryker

      - name: Run unit tests
        uses: ./.github/actions/run-mutations-testing
        with:
          solution_path: plan-technology-for-your-school.sln

      - name: Get markdown results
        run: |
          MUTATION_RESULTS=$(cat $(find StrykerOutput -type f -name "mutation-report.md"))
          echo "MUTATION_RESULTS=$MUTATION_RESULTS" >> $GITHUB_ENV

      - name: Comment results
        uses: ./.github/actions/post-pr-comment
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_actor: ${{ github.actor }}
          github_event_name: ${{ github.event_name }}
          github_workflow: ${{ github.workflow }}
          content: ${{ env.MUTATION_RESULTS }}
