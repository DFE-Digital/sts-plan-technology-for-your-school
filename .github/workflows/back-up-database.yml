name: Back up database & secrets

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        default: 'Dev'
  workflow_dispatch:
    inputs:
      environment:
        description: Which environment to back up
        required: true
        type: choice
        options: ['Dev', 'Test', 'StagingUnprotected', 'ProductionUnprotected']
        default: 'Dev'
  push:
     branches:
       - disaster-recovery-e2e-terraform
env:
  SQL_BACKUP_CONTAINER_NAME: sqlbackups
  SECRETMANIFEST_BACKUP_CONTAINER_NAME: secretnames
  MANIFEST: secret-manifest.txt
  SOURCE_KV: "${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}-kv"

jobs:
  backup-db:
    environment:
      name: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')  && inputs.environment || 'Dev' }}
    name: Back up database
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Azure CLI Login
        uses: ./.github/actions/azure-login
        with:
          az_tenant_id: ${{ secrets.AZ_TENANT_ID }}
          az_subscription_id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          az_client_id: ${{ secrets.AZ_CLIENT_ID }}

      - name: Build backup resource names
        id: backup-names
        shell: bash
        env:
          ENVIRONMENT: ${{ secrets.AZ_ENVIRONMENT }}
          PROJECT_NAME: ${{ secrets.DFE_PROJECT_NAME }}
        run: |
          resource_group="${ENVIRONMENT}${PROJECT_NAME}-backup"
          account_name="${resource_group//-/}"

          echo "resource-group=$resource_group" >> "$GITHUB_OUTPUT"
          echo "account-name=$account_name" >> "$GITHUB_OUTPUT"

      - name: Install SqlPackage
        run: dotnet tool install --global Microsoft.SqlPackage

      - name: Get GitHub Runner IP
        id: whats-my-ip
        uses: ./.github/actions/whats-my-ip-address

      - name: Whitelist Runner for SQL Server
        uses: ./.github/actions/whitelist-sql
        with:
          ip-address: ${{ steps.whats-my-ip.outputs.ip }}
          resource-group: ${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}
          server-name: ${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}
          verb: 'add'

      - name: Whitelist Runner for backup storage
        uses: ./.github/actions/whitelist-storage
        with:
          ip-address: ${{ steps.whats-my-ip.outputs.ip }}
          resource-group: ${{ steps.backup-names.outputs.resource-group }}
          account-name: ${{ steps.backup-names.outputs.account-name }}
          verb: add

      - name: Export database
        run: |
          ACCESS_TOKEN="$(az account get-access-token \
            --resource https://database.windows.net/ \
            --query accessToken -o tsv)"

          sqlpackage /Action:Export \
            /SourceServerName:"tcp:${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}.database.windows.net,1433" \
            /SourceDatabaseName:"${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}-sqldb" \
            /TargetFile:"db-$(date +%F).bacpac" \
            /AccessToken:"$ACCESS_TOKEN"

      - name: Save bacpac
        run: |
          az storage blob upload \
          --account-name "$(echo "${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}backup" | tr -d '-')" \
          --container-name ${{ env.SQL_BACKUP_CONTAINER_NAME }} \
          --name db-$(date +%F).bacpac \
          --file db-$(date +%F).bacpac \
          --auth-mode login

      - name: De-Whitelist Runner for SQL Server
        uses: ./.github/actions/whitelist-sql
        with:
          ip-address: ${{ steps.whats-my-ip.outputs.ip }}
          resource-group: ${{ steps.backup-names.outputs.resource-group }}
          account-name: ${{ steps.backup-names.outputs.account-name }}
          verb: 'remove'

      - name: De-Whitelist Runner for backup storage
        uses: ./.github/actions/whitelist-storage
        with:
          ip-address: ${{ steps.whats-my-ip.outputs.ip }}
          resource-group: ${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}-backup
          account-name: ${${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}-backup//-/}
          verb: remove

  backup-secrets:
      environment:
        name: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call')  && inputs.environment || 'Dev' }}
      name: Back up app secrets
      runs-on: ubuntu-22.04
      permissions:
        id-token: write
        contents: read

      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4
          with:
            ref: ${{ github.ref }}

        - name: Azure CLI Login
          uses: ./.github/actions/azure-login
          with:
            az_tenant_id: ${{ secrets.AZ_TENANT_ID }}
            az_subscription_id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
            az_client_id: ${{ secrets.AZ_CLIENT_ID }}

        - name: Get GitHub Runner IP
          id: whats-my-ip
          uses: ./.github/actions/whats-my-ip-address

        - name: Prepare backup names
          id: backup_names
          shell: bash
          run: |
            BACKUP_RESOURCE_GROUP="${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}-backup"
            BACKUP_KV="${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}-backup"
            BACKUP_STORAGE_ACCOUNT="${BACKUP_RESOURCE_GROUP//-/}"

            echo "resource_group=$BACKUP_RESOURCE_GROUP" >> "$GITHUB_OUTPUT"
            echo "storage_account=$BACKUP_STORAGE_ACCOUNT" >> "$GITHUB_OUTPUT"
            echo "kv=$BACKUP_KV" >> "$GITHUB_OUTPUT"

        - name: Whitelist Runner for backup keyvault
          uses: ./.github/actions/whitelist-kv
          with:
            ip-address: ${{ steps.whats-my-ip.outputs.ip }}
            resource-group: ${{ steps.backup_names.outputs.resource_group }}
            keyvault-name: ${{ steps.backup_names.outputs.kv }}
            verb: 'add'

        - name: Whitelist Runner for app keyvault
          uses: ./.github/actions/whitelist-kv
          with:
            ip-address: ${{ steps.whats-my-ip.outputs.ip }}
            resource-group: ${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}
            keyvault-name: ${{ ENV.SOURCE_KV }}
            verb: 'add'

        - name: Whitelist Runner for backup storage
          uses: ./.github/actions/whitelist-storage
          with:
            ip-address: ${{ steps.whats-my-ip.outputs.ip }}
            resource-group: ${{ steps.backup_names.outputs.resource_group }}
            account-name: ${{ steps.backup_names.outputs.storage_account }}
            verb: add

        - name: Copy secrets
          shell: bash
          run: |
            set -euo pipefail

            SOURCE_KV="${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}-kv"
            TARGET_KV="${{ steps.backup_names.outputs.kv }}"

            az keyvault secret list \
              --vault-name "$SOURCE_KV" \
              --query "[].{name:name,id:id}" \
              -o tsv |
            while IFS=$'\t' read -r SECRET_NAME SECRET_ID; do
              SECRET_NAME="${SECRET_NAME//$'\r'/}"
              SECRET_ID="${SECRET_ID//$'\r'/}"

              [ -z "$SECRET_NAME" ] && continue

              echo "Copying $SECRET_NAME"

              SECRET_VALUE="$(az keyvault secret show \
                --id "$SECRET_ID" \
                --query "value" \
                -o tsv | tr -d '\r\n')"

              if [ -z "$SECRET_VALUE" ]; then
                echo "Skipping $SECRET_NAME because value was empty"
                continue
              fi

              az keyvault secret set \
                --vault-name "$TARGET_KV" \
                --name "$SECRET_NAME" \
                --value "$SECRET_VALUE" \
                >/dev/null
            done

        - name: Copy secret manifest
          run: |
            SOURCE_KV="${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}-kv"
            az keyvault secret list \
              --vault-name "$SOURCE_KV" \
              --query "[].name" \
              -o tsv > "${{ env.MANIFEST }}"

            az storage blob upload \
              --account-name "${{ steps.backup_names.outputs.storage_account }}" \
              --container-name "${{ env.SECRETMANIFEST_BACKUP_CONTAINER_NAME }}" \
              --name "${{ env.MANIFEST }}" \
              --file "${{ env.MANIFEST }}" \
              --auth-mode login \
              --overwrite true

        - name: De-Whitelist Runner for backup keyvault
          uses: ./.github/actions/whitelist-kv
          with:
            ip-address: ${{ steps.whats-my-ip.outputs.ip }}
            resource-group: ${{ steps.backup_names.outputs.resource_group }}
            keyvault-name: ${{ steps.backup_names.outputs.kv }}
            verb: 'remove'

        - name: De-Whitelist Runner for app keyvault
          uses: ./.github/actions/whitelist-kv
          with:
            ip-address: ${{ steps.whats-my-ip.outputs.ip }}
            resource-group: ${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}
            keyvault-name: ${{ ENV.SOURCE_KV }}
            verb: 'remove'

        - name: De-Whitelist Runner for backup storage
          uses: ./.github/actions/whitelist-storage
          with:
            ip-address: ${{ steps.whats-my-ip.outputs.ip }}
            resource-group: ${{ steps.backup_names.outputs.resource_group }}
            account-name: ${{ steps.backup_names.outputs.storage_account }}
            verb: remove
