name: Code PR Check

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group:
    '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref ||
    github.ref }}'
  cancel-in-progress: true

env:
  DOTNET_VERSION: ${{ vars.DOTNET_VERSION }}

jobs:
  sentinel:
    # PR Sentinel (always runs)
    #
    # This job has no `if:` condition, so it runs on every PR regardless of
    # which files changed. It exists for two reasons:
    #
    # 1. Branch protection needs a check that's *guaranteed* to report.
    #    Conditional jobs below (build/test/etc.) don't post any status at all
    #    when their `if:` evaluates false — they don't "pass", they just never
    #    run. If branch protection required one of those directly, a PR that
    #    doesn't touch the relevant files would block forever waiting for a
    #    check that will never appear. Sentinel is the safe thing to mark as
    #    a required check.
    #
    # 2. verify-checks-running.yml needs a non-empty baseline to poll for.
    #    Its `expected` set always includes this job's name (see
    #    .github/pr-check-manifest.json -> "always"). Without it, a PR that
    #    touches nothing matched by pr-check-areas.yml would have an empty
    #    expected set, and the poll would trivially "pass" without ever
    #    confirming this workflow actually triggered at all.
    #
    # tl;dr: don't remove this or give it a conditional — it's the anchor
    # both branch protection and the verification workflow rely on.
    name: PR Sentinel (always runs)
    runs-on: ubuntu-22.04
    steps:
      - run: echo "PR detected - checks will conditionally run."

  # Use per-job path filters with dorny/paths-filter instead of top-level paths
  detect-changes:
    name: Detect changed areas
    runs-on: ubuntu-22.04
    outputs:
      contentful: ${{ steps.filter.outputs.contentful }}
      github: ${{ steps.filter.outputs.github }}
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: '.github/pr-check-areas.yml'

  build-test-web-app:
    name: Build and run unit tests
    runs-on: ubuntu-22.04
    needs: [detect-changes]
    permissions:
      checks: write
      contents: read
    if:
      ${{ always() && (needs.detect-changes.outputs.src == 'true' ||
      needs.detect-changes.outputs.tests == 'true' || needs.detect-changes.outputs.github ==
      'true')}}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        # Fetch depth 0 required for Sonar to do full analysis
        with:
          fetch-depth: 0

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install latest JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '21'

      - name: Install dotnet coverage
        run: dotnet tool install --global dotnet-coverage --version 17.9.3

      - name: Install SonarCloud scanners
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Start SonarCloud scanner
        run: |
          dotnet-sonarscanner begin \
          /k:"DFE-Digital_plan-technology-for-your-school" \
          /o:"dfe-digital" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml \
          /d:sonar.coverage.exclusions=**/Program.cs,**/gulpfile.js,**/wwwroot/**,**/Dfe.PlanTech.Web.SeedTestData/** \
          /d:sonar.issue.ignore.multicriteria=e1 \
          /d:sonar.issue.ignore.multicriteria.e1.ruleKey=csharpsquid:S6602 \
          /d:sonar.issue.ignore.multicriteria.e1.resourceKey=src/**/*.cs \
          /d:sonar.scanner.scanAll=false

      - name: Build web app
        uses: ./.github/actions/build-dotnet-app
        with:
          dotnet_version: ${{ env.DOTNET_VERSION }}
          solution_filename: plan-technology-for-your-school.sln

      - name: Run unit tests
        uses: ./.github/actions/run-unit-tests
        with:
          solution_filename: plan-technology-for-your-school.sln

      - name: Merge test results
        run:
          dotnet-coverage merge -f xml -o "coverage.xml" -s "coverage.settings.xml" -r
          coverage.cobertura.xml

      - name: End SonarCloud Scanner
        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Archive code coverage results
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: coverage.xml

  build-database-upgrader:
    name: Build database upgrader
    runs-on: ubuntu-22.04
    needs: [detect-changes]
    if:
      ${{needs.detect-changes.outputs.src == 'true' || needs.detect-changes.outputs.github
      =='true'}}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build database upgrader
        uses: ./.github/actions/build-dotnet-app
        with:
          dotnet_version: ${{ env.DOTNET_VERSION }}
          solution_filename: ./src/Dfe.PlanTech.DatabaseUpgrader/Dfe.PlanTech.DatabaseUpgrader.sln

  run-javascript-tests:
    runs-on: ubuntu-22.04
    name: Run javascript tests
    needs: [detect-changes]
    if:
      ${{ needs.detect-changes.outputs.tests == 'true' || needs.detect-changes.outputs.github
      =='true'}}
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        working-directory: ./tests/Dfe.PlanTech.Web.Node.UnitTests/
        run: npm install

      - name: Run the tests
        working-directory: ./tests/Dfe.PlanTech.Web.Node.UnitTests/
        run: npm test

      - name: Test report
        uses: dorny/test-reporter@v1
        if: success() || failure() # run this step even if previous step failed
        with:
          name: JEST Tests # Name of the check run which will be created
          path: ./tests/Dfe.PlanTech.Web.Node.UnitTests/junit.xml # Path to test results
          reporter: jest-junit # Format of test results

  run-contentful-jest-tests:
    name: Run Jest Tests for Contentful
    runs-on: ubuntu-22.04
    needs: [detect-changes]
    if:
      ${{ needs.detect-changes.outputs.contentful == 'true' || needs.detect-changes.outputs.github
      =='true'}}
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        working-directory: ./contentful
        run: npm install

      - name: Run JEST Tests
        working-directory: ./contentful/tests
        run: npm test -- --ci --reporters=default --reporters=jest-junit

      - name: Test Report
        if: (success() || failure())
        uses: dorny/test-reporter@v1
        with:
          name: Contentful Jest Tests
          path: ./contentful/junit.xml
          reporter: jest-junit
