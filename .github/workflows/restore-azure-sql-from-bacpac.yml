name: Restore Azure SQL DB from BACPAC

#todo: consider auto generating naming from project and env vars? less flexible tho
on:
  workflow_call:
    inputs:
      resource_group:
        required: true
        type: string
      backup_resource_group:
        required: true
        type: string
      sql_server_name:
        required: true
        type: string
      target_database:
        required: true
        type: string
      storage_account:
        required: true
        type: string
      container_name:
        required: true
        type: string
      bacpac_file:
        required: false
        type: string
        default: ""
      bacpac_prefix:
        required: false
        type: string
        default: ""
      use_latest_if_not_specified:
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      resource_group:
        required: true
        type: string
      backup_resource_group:
        required: true
        type: string
      sql_server_name:
        required: true
        type: string
      target_database:
        required: true
        type: string
      storage_account:
        required: true
        type: string
      container_name:
        required: true
        type: string
      bacpac_file:
        required: false
        type: string
        default: ""
      bacpac_prefix:
        required: false
        type: string
        default: ""
      use_latest_if_not_specified:
        required: false
        type: boolean
        default: true

  push:
    branches:
       - disaster-recovery-e2e-terraform

jobs:
  restore:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      BACKUP_RESOURCE_GROUP: ${{ github.event_name == 'push' && 's190d01-plantech-backups' || inputs.resource_group }}
      RESOURCE_GROUP: ${{ github.event_name == 'push' && 's190d01-plantech-dr' || inputs.resource_group }}
      SQL_SERVER_NAME: ${{ github.event_name == 'push' && 's190d01plantechdr' || inputs.sql_server_name }}
      TARGET_DATABASE: ${{ github.event_name == 'push' && 's190d01-plantechdr-sqldb' || inputs.target_database }}
      BACKUP_STORAGE_ACCOUNT: ${{ github.event_name == 'push' && 'plantechsqlbackups' || inputs.storage_account }}
      CONTAINER_NAME: ${{ github.event_name == 'push' && 'sqlbackups' || inputs.container_name }}
      BACPAC_FILE: ${{ github.event_name == 'push' && '' || inputs.bacpac_file }}
      BACPAC_PREFIX: ${{ github.event_name == 'push' && '' || inputs.bacpac_prefix }}
      USE_LATEST_IF_NOT_SPECIFIED: ${{ github.event_name == 'push' && 'true' || inputs.use_latest_if_not_specified }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login with AZ
        uses: ./.github/actions/azure-login
        with:
          az_tenant_id: ${{ secrets.AZ_TENANT_ID }}
          az_subscription_id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          az_client_id: ${{ secrets.AZ_CLIENT_ID }}

      - name: Get GitHub Runner IP
        id: whats-my-ip
        uses: ./.github/actions/whats-my-ip-address

      - name: Whitelist Runner for Storage account, KeyVault, and TF KeyVault
        uses: ./.github/actions/whitelisting-for-runner
        with:
          runner_ip: ${{ steps.whats-my-ip.outputs.ip }}
          az_aca_resource_group: ${{ env.RESOURCE_GROUP }}
          sql_server_name: ${{ env.SQL_SERVER_NAME }}
          sa_resource_group: ${{ env.BACKUP_RESOURCE_GROUP }}
          sa_name: ${{ env.BACKUP_STORAGE_ACCOUNT }}
          removeRules: 'false'

      - name: Restore 
        uses: ./.github/actions/restore-db-from-bacpac
        with:
          resource_group: ${{ inputs.backup_resource_group }}
          sql_server_name: ${{ inputs.sql_server_name }}
          target_database: ${{ inputs.target_database }}
          storage_account: ${{ inputs.storage_account }}
          container_name: ${{ inputs.container_name }}
          bacpac_file: ${{ inputs.bacpac_file }}
          bacpac_prefix: ${{ inputs.bacpac_prefix }}
          use_latest_if_not_specified: ${{ inputs.use_latest_if_not_specified }}

      - name: Whitelist Runner for Storage account, KeyVault, and TF KeyVault
        uses: ./.github/actions/whitelisting-for-runner
        with:
          runner_ip: ${{ steps.whats-my-ip.outputs.ip }}
          az_aca_resource_group: ${{ env.RESOURCE_GROUP }}
          sql_server_name: ${{ env.SQL_SERVER_NAME }}
          sa_resource_group: ${{ env.BACKUP_RESOURCE_GROUP }}
          sa_name: ${{ env.BACKUP_STORAGE_ACCOUNT }}
          removeRules: 'true'
