name: Infrastructure Deploy - Platform

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        required: true
        options:
          - Dev
          - Tst
          - Staging
          - Production
      is_dr:
        type: boolean
        default: false
  push:
    branches:
      - disaster-recovery-e2e-terraform

env:
  IS_DR: ${{ github.event_name == 'workflow_dispatch' && inputs.is_dr || true }}
  ENVIRONMENT_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'Dev' }}
  ARM_USE_OIDC: true
  TF_BACKEND_CONTAINER_NAME: tfstate
  TF_BACKEND_KEY: terraform.tfstate

jobs:
  platform-deploy:
    name: Platform deploy
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.7

      - name: Login with AZ
        uses: ./.github/actions/azure-login
        with:
          az_tenant_id: ${{ secrets.az_tenant_id }}
          az_subscription_id: ${{ secrets.az_subscription_id }}
          az_client_id: ${{ secrets.az_client_id }}

      - name: Get GitHub Runner IP
        id: whats-my-ip
        uses: ./.github/actions/whats-my-ip-address

      - name: Prepare derived variables
        id: set-vars
        shell: bash
        run: |
          AZ_ACA_RESOURCE_GROUP= ${{ env.IS_DR && format('{0}-dr', secrets.AZ_ACA_RESOURCE_GROUP) || secrets.AZ_ACA_RESOURCE_GROUP }}
          CLEAN_VAR=${AZ_ACA_RESOURCE_GROUP//-/}
          AZ_SA_COSTING_NAME="${CLEAN_VAR}costing"
          TF_BACKEND_STORAGE_ACCOUNT_NAME="${CLEAN_VAR}tfstate"
          ACR_NAME="${CLEAN_VAR}"
          COSTINGS_NAME="${CLEAN_VAR}costing"
          
          TF_BACKEND_RESOURCE_GROUP= ${{ env.IS_DR && format('{0}-dr', secrets.TF_BACKEND_RESOURCE_GROUP) || secrets.TF_BACKEND_RESOURCE_GROUP }}
          TF_SECRETS_KEYVAULT_NAME= ${{ secrets.TF_BACKEND_RESOURCE_GROUP }}-kv
          AZ_KEYVAULT_NAME= ${{ secrets.AZ_ACA_RESOURCE_GROUP }}-kv

          echo "az_sa_costing_name=$AZ_SA_COSTING_NAME" >> "$GITHUB_OUTPUT"
          echo "tf_backend_storage_account_name=$TF_BACKEND_STORAGE_ACCOUNT_NAME" >> "$GITHUB_OUTPUT"
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"
          echo "costings_name=$COSTINGS_NAME" >> "$GITHUB_OUTPUT"
          echo "app_rg_name=$AZ_ACA_RESOURCE_GROUP" >> "$GITHUB_OUTPUT"
          echo "tf_backend_rg_name=$TF_BACKEND_RESOURCE_GROUP" >> "$GITHUB_OUTPUT"
          echo "tf_kv_name=$TF_SECRETS_KEYVAULT_NAME" >> "$GITHUB_OUTPUT"
          echo "app_kv_name=$AZ_KEYVAULT_NAME" >> "$GITHUB_OUTPUT"

      - name: Bootstrap
        uses: ./.github/actions/bootstrap
        with:
          environment: ${{ inputs.environment }}
          az_location: ${{ vars.AZ_LOCATION }}
          tf_backend_resource_group: ${{ steps.set-vars.outputs.tf_backend_rg_name }}
          tf_container_name: ${{ env.TF_BACKEND_CONTAINER_NAME }}
          tf_storage_acc_name: ${{ steps.set-vars.outputs.tf_backend_storage_account_name }}
          tf_keyvault_name: ${{ steps.set-vars.outputs.tf_kv_name }}
          az_object_id: ${{ secrets.az_object_id }}
