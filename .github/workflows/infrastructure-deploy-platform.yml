name: Infrastructure Deploy - Platform

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        required: true
        options:
          - Dev
          - Tst
          - Staging
          - Production
      is_dr:
        type: boolean
        default: false
  push:
    branches:
      - disaster-recovery-e2e-terraform

env:
  ARM_USE_OIDC: true
  TF_BACKEND_CONTAINER_NAME: tfstate
  TF_BACKEND_KEY: terraform.tfstate

jobs:
  platform-deploy:
    name: Platform deploy
    runs-on: ubuntu-22.04
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'Dev' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Clone repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.7

      - name: Prepare derived variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          ENVIRONMENT_NAME="${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'Dev' }}"
          IS_DR="${{ github.event_name == 'workflow_dispatch' && inputs.is_dr || true }}"

          if [ "$IS_DR" = "true" ]; then
            DFE_PROJECT_NAME="pt-dr"
          else
            DFE_PROJECT_NAME="${{ secrets.DFE_PROJECT_NAME }}"
          fi

          RESOURCE_PREFIX_BACKUP="${{ secrets.AZ_ENVIRONMENT }}${DFE_PROJECT_NAME}-backup"
          RESOURCE_PREFIX_TF="${{ secrets.AZ_ENVIRONMENT }}${DFE_PROJECT_NAME}-tf"

          RESOURCE_PREFIX_BACKUP_SHORT="${RESOURCE_PREFIX_BACKUP//-/}"
          RESOURCE_PREFIX_TF_SHORT="${RESOURCE_PREFIX_TF//-/}"

          TF_KEYVAULT_NAME="${RESOURCE_PREFIX_TF}-kv"

          echo "ENVIRONMENT_NAME=$ENVIRONMENT_NAME" >> "$GITHUB_OUTPUT"
          echo "IS_DR=$IS_DR" >> "$GITHUB_OUTPUT"
          echo "RESOURCE_PREFIX_BACKUP=$RESOURCE_PREFIX_BACKUP" >> "$GITHUB_OUTPUT"
          echo "RESOURCE_PREFIX_TF=$RESOURCE_PREFIX_TF" >> "$GITHUB_OUTPUT"
          echo "RESOURCE_PREFIX_BACKUP_SHORT=$RESOURCE_PREFIX_BACKUP_SHORT" >> "$GITHUB_OUTPUT"
          echo "RESOURCE_PREFIX_TF_SHORT=$RESOURCE_PREFIX_TF_SHORT" >> "$GITHUB_OUTPUT"
          echo "TF_KEYVAULT_NAME=$TF_KEYVAULT_NAME" >> "$GITHUB_OUTPUT"

      - name: Login with AZ
        uses: ./.github/actions/azure-login
        with:
          az_tenant_id: ${{ secrets.az_tenant_id }}
          az_subscription_id: ${{ secrets.az_subscription_id }}
          az_client_id: ${{ secrets.az_client_id }}

      - name: Deploy TF Resources
        uses: ./.github/actions/deploy-tf-resources
        with:
          environment: ${{ steps.vars.outputs.ENVIRONMENT_NAME }}
          az_location: ${{ vars.AZ_LOCATION }}
          tf_backend_resource_group: ${{ steps.vars.outputs.RESOURCE_PREFIX_TF }}
          tf_container_name: ${{ env.TF_BACKEND_CONTAINER_NAME }}
          tf_storage_acc_name: ${{ steps.vars.outputs.RESOURCE_PREFIX_TF_SHORT }}
          tf_keyvault_name: ${{ steps.vars.outputs.TF_KEYVAULT_NAME }}
          az_client_id: ${{ secrets.az_client_id }}
