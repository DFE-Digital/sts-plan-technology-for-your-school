name: Run Playwright E2E Tests (Environment)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Which app environment to run against?
        required: true
        type: choice
        options: ['Dev', 'Tst', 'StagingUnprotected']
        default: 'Tst'
      use_mock_auth:
        description: Use mock auth
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      use_mock_auth:
        required: false
        type: boolean
        default: false

concurrency:
  group: '${{ github.workflow }}'
  cancel-in-progress: false

env:
  DOTNET_VERSION: ${{ vars.DOTNET_VERSION }}

jobs:
  run-tests:
    permissions:
      id-token: write
      contents: read
    name: Run Playwright + Cucumber Tests
    environment: ${{ inputs.environment || github.event.inputs.environment || 'Tst' }}
    runs-on: ubuntu-22.04
    env:
      PROJECT_PATH: ./src/Dfe.PlanTech.Web/Dfe.PlanTech.Web.csproj
      KEYVAULT_NAME: ${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}-kv
      RESOURCE_GROUP: ${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}
      SQL_IP_NAME: e2e-tests-pr
      MOCK_AUTH_MODE: ${{ inputs.use_mock_auth && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Login with AZ
        uses: ./.github/actions/azure-login
        with:
          az_tenant_id: ${{ secrets.AZ_TENANT_ID }}
          az_subscription_id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          az_client_id: ${{ secrets.AZ_CLIENT_ID }}

      - name: Get workflow IP address
        id: whats-my-ip
        uses: ./.github/actions/whats-my-ip-address

      - name: Whitelist IP on Key Vault
        uses: ./.github/actions/whitelist-kv
        with:
          ip-address: ${{ steps.whats-my-ip.outputs.ip }}
          resource-group: ${{ env.RESOURCE_GROUP }}
          keyvault-name: ${{ env.KEYVAULT_NAME }}
          verb: add

      - name: Whitelist IP on SQL server
        uses: ./.github/actions/whitelist-sql
        with:
          ip-address: ${{ steps.whats-my-ip.outputs.ip }}
          resource-group: ${{ env.RESOURCE_GROUP }}
          server-name: ${{ env.RESOURCE_GROUP }}
          rule-name: ${{ env.SQL_IP_NAME }}
          verb: add

      - name: Get mock auth client secret from Key Vault
        if: ${{ env.MOCK_AUTH_MODE == 'true' }}
        shell: bash
        run: |
          secret_value="$(az keyvault secret show \
            --vault-name "${KEYVAULT_NAME}" \
            --name "e2e-mock-auth-client-secret" \
            --query value \
            --output tsv)"

          echo "::add-mask::$secret_value"
          echo "MOCK_AUTH_CLIENT_SECRET=$secret_value" >> "$GITHUB_ENV"

      - name: Set environment-specific variables
        shell: bash
        run: |
          SELECTED_ENV="${{ inputs.environment || github.event.inputs.environment || 'Tst' }}"

          case "$SELECTED_ENV" in
            Dev)
              echo "APP_URL=https://dev.plan-technology-for-your-school.education.gov.uk" >> "$GITHUB_ENV"
              ;;
            Tst)
              echo "APP_URL=https://test.dev.plan-technology-for-your-school.education.gov.uk" >> "$GITHUB_ENV"
              ;;
            Staging)
              echo "APP_URL=https://staging.plan-technology-for-your-school.education.gov.uk" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unknown environment: $SELECTED_ENV"
              exit 1
              ;;
          esac

      - name: Turn on Automated Testing Content on environment
        if: always()
        uses: azure/cli@v2
        env:
          MOCK_AUTH_MODE: ${{ env.MOCK_AUTH_MODE }}
          MOCK_AUTH_CLIENT_SECRET: ${{ env.MOCK_AUTH_CLIENT_SECRET }}        
        with:
          inlineScript: |
            EXTRA_SET_VARS=""

            if [ "$MOCK_AUTH_MODE" = "true" ]; then
              EXTRA_SET_VARS="DfeSignIn__Authority=${APP_URL}/api/mock-auth/token DfeSignIn__MetadataUrl=${APP_URL}/api/mock-auth/.well-known/openid-configuration"
            fi

            az containerapp update \
              --name ${{ secrets.AZ_ACA_NAME }} \
              --resource-group ${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }} \
              --set-env-vars \
              AutomatedTesting__Contentful__IncludeTaggedContent=true \
              AutomatedTesting__MockAuthentication__ClientSecret="${MOCK_AUTH_CLIENT_SECRET}" \
              $EXTRA_SET_VARS

      - name: Install NPM dependencies
        working-directory: ./tests/Dfe.PlanTech.Web.E2ETests.Beta/
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-1.51.1

      - name: Install Playwright browsers (tests dir)
        working-directory: ./tests/Dfe.PlanTech.Web.E2ETests.Beta/
        run: npx playwright install --with-deps chromium

      - name: Run Playwright + Cucumber tests (with recording)
        working-directory: ./tests/Dfe.PlanTech.Web.E2ETests.Beta/
        env:
          MOCK_AUTH_MODE: ${{ env.MOCK_AUTH_MODE }}
          MOCK_AUTH_CLIENT_SECRET: ${{ env.MOCK_AUTH_CLIENT_SECRET }}        
          URL: ${{ secrets.APP_URL }}
          DSI_SCHOOL_EMAIL: ${{ secrets.DSI_SCHOOL_EMAIL }}
          DSI_SCHOOL_PASSWORD: ${{ secrets.DSI_SCHOOL_PASSWORD }}
          DSI_SCHOOL_ESTABLISHMENT_REF: '900008'
          DSI_MAT_EMAIL: ${{ secrets.DSI_MAT_EMAIL }}
          DSI_MAT_PASSWORD: ${{ secrets.DSI_MAT_PASSWORD }}
          DSI_MAT_SCHOOL_ESTABLISHMENT_REF: '900007'
          DSI_NOORG_EMAIL: ${{ secrets.DSI_NOORG_EMAIL }}
          DSI_NOORG_PASSWORD: ${{ secrets.DSI_NOORG_PASSWORD }}
          DB_SERVER: ${{ secrets.AZ_DB_SERVER }}
          DB_MODE: azure
          DB_USER: sa
          DB_DATABASE: ${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}-sqldb
          HEADLESS: true
          NODE_ICU_DATA: ./node_modules/full-icu
          LANG: en_GB.UTF-8
          LC_ALL: en_GB.UTF-8
          TZ: Europe/London
        run: npm run test:login && npm run test:record

      - name: Merge cucumber JSON reports
        if: always()
        working-directory: ./tests/Dfe.PlanTech.Web.E2ETests.Beta/
        shell: bash
        run: |
          node -e "const fs=require('fs');
          const a=JSON.parse(fs.readFileSync('reports/cucumber-parallel.json','utf8'));
          const b=JSON.parse(fs.readFileSync('reports/cucumber-serial.json','utf8'));
          fs.writeFileSync('reports/cucumber-report.json', JSON.stringify([...a, ...b]));"

      - name: Summarise Cucumber results
        if: always()
        run: |
          node ./tests/Dfe.PlanTech.Web.E2ETests.Beta/cucumber-summary.js ./tests/Dfe.PlanTech.Web.E2ETests.Beta/reports/cucumber-report.json

      - name: Generate HTML report
        if: always()
        working-directory: ./tests/Dfe.PlanTech.Web.E2ETests.Beta/
        run: npm run report

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-report
          path: ./tests/Dfe.PlanTech.Web.E2ETests.Beta/reports/
          if-no-files-found: warn

      - name: Upload Playwright screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: ./tests/Dfe.PlanTech.Web.E2ETests.Beta/screenshots/
          if-no-files-found: ignore

      - name: Upload Playwright videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: ./tests/Dfe.PlanTech.Web.E2ETests.Beta/videos/
          if-no-files-found: ignore
          compression-level: 1

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: ./tests/Dfe.PlanTech.Web.E2ETests.Beta/traces/
          if-no-files-found: ignore
          compression-level: 1

      - name: Remove IP from Key Vault
        if: always()
        uses: ./.github/actions/whitelist-kv
        with:
          ip-address: ${{ steps.whats-my-ip.outputs.ip }}
          resource-group: ${{ env.RESOURCE_GROUP }}
          keyvault-name: ${{ env.KEYVAULT_NAME }}
          verb: remove

      - name: Remove IP from SQL server
        if: always()
        uses: ./.github/actions/whitelist-sql
        with:
          ip-address: ${{ steps.whats-my-ip.outputs.ip }}
          resource-group: ${{ env.RESOURCE_GROUP }}
          server-name: ${{ env.RESOURCE_GROUP }}
          rule-name: ${{ env.SQL_IP_NAME }}
          verb: remove

      - name: Turn off Automated Testing Content on environment
        if: always()
        uses: azure/cli@v2
        env:
          MOCK_AUTH_MODE: ${{ env.MOCK_AUTH_MODE }}        
        with:
          inlineScript: |
            REMOVE_VARS=""

            if [ "${MOCK_AUTH_MODE,,}" = "true" ]; then
              REMOVE_VARS="--remove-env-vars AutomatedTesting__MockAuthentication__ClientSecret DfeSignIn__Authority DfeSignIn__MetadataUrl"
            fi

            az containerapp update \
              --name ${{ secrets.AZ_ACA_NAME }} \
              --resource-group ${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }} \
              --set-env-vars AutomatedTesting__Contentful__IncludeTaggedContent=false \
              $REMOVE_VARS

      - name: Flush Redis Cache
        uses: ./.github/actions/flush-redis-cache
        with:
          az_redis_name: ${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}
          az_resource_group: ${{ secrets.AZ_ENVIRONMENT }}${{ secrets.DFE_PROJECT_NAME }}
