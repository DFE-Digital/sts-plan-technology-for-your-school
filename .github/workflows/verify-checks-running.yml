name: Verify Checks Running
on:
  pull_request_target:
    branches: ['main', 'development']
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  checks: read
  pull-requests: read
  contents: read

jobs:
  verify-checks-started:
    name: Verify Checks Running
    runs-on: ubuntu-22.04
    steps:
      # We check out the base branch here without `ref:` so that we get the trusted
      # workflow config from the base branch. This prevents attackers from removing
      # checks from .github/pr-check-manifest.json in order to make it look like
      # the PR is passing when it is not. We do not check out the PR *head* branch
      # because that would allow untrusted code to run in this workflow.
      - name: Check out base branch (trusted config only)
        uses: actions/checkout@v4

      - name: Install script dependencies
        run: npm install js-yaml@4 minimatch@10 --no-save

      - uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const pr = context.payload.pull_request;
            const head = pr.head.sha;

            // 1) Figure out what changed
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number: pr.number, per_page: 100
            });
            const changed = files.map(f => f.filename);

            // 2) Decide which checks are expected
            const fs = require('fs');
            const { minimatch } = require('minimatch');
            const yaml = require('js-yaml');
            const areas = yaml.load(fs.readFileSync('.github/pr-check-areas.yml', 'utf8'));
            const manifest = JSON.parse(fs.readFileSync('.github/pr-check-manifest.json', 'utf8'));

            function touched(area) {
              const patterns = areas[area] || [];
              return changed.some(f => patterns.some(p => minimatch(f, p)));
            }

            const expected = new Set(manifest.always);
            if (touched('src') || touched('tests')) {
              manifest.src_or_tests.forEach(check => expected.add(check));
            }
            if (touched('contentful')) {
              manifest.contentful.forEach(check => expected.add(check));
            }

            // 3) Poll for checks + statuses on the PR head SHA
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            async function seenNames() {
              const a = await github.rest.checks.listForRef({ owner, repo, ref: head, per_page: 100 });
              const b = await github.rest.repos.getCombinedStatusForRef({ owner, repo, ref: head });
              const names = new Set(a.data.check_runs.map(c => c.name));
              b.data.statuses.forEach(s => names.add(s.context));
              return names;
            }

            let names = new Set();
            let ok = false;
            for (let i = 0; i < 18; i++) { // ~3 minutes
              names = await seenNames();
              const missing = [...expected].filter(n => !names.has(n));
              core.info(`Observed checks: ${[...names].join(', ') || '(none yet)'}`);
              if (missing.length === 0) { ok = true; break; }
              await sleep(10000);
            }

            if (!ok) {
              const missing = [...expected].filter(n => !names.has(n));
              core.setFailed(
                `Required checks did not start for ${head.slice(0,7)}.\n` +
                `Expected (based on changed files): ${[...expected].join(', ')}\n` +
                `Seen: ${[...names].join(', ') || '(none)'}\n` +
                `Changed files: ${changed.slice(0,50).join(', ')}${changed.length>50?' …':''}`
              );
            }
