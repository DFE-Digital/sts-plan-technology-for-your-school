name: Promote image
description: Find the latest appropriate image on GHCR and push to ACR

inputs:
  image_branch:
    required: true
    description: branch to search for in image tag (main or development)
  acr_name:
    required: true
    description: name of the acr resource
  github_repo:
    required: true
    description: image repo name in GHCR

outputs:
  image_tag:
    value: ${{ steps.image.outputs.image_tag }}
    description: the image tag put onto acr

runs:
  using: composite
  steps:
    - name: Get latest matching tag
      id: get_tag
      shell: bash
      run: |
        set -euo pipefail

        SEARCH="${{ inputs.image_branch }}"
        IMAGE_REPO="${{ inputs.github_repo }}"

        RESPONSE=$(curl -fsSL \
          -H "Authorization: Bearer ${{ github.token }}" \
          "https://ghcr.io/v2/dfe-digital/${IMAGE_REPO}/tags/list")

        TAG=$(echo "$RESPONSE" \
          | jq -r '.tags[]?' \
          | grep "$SEARCH" \
          | sort -r \
          | head -n 1)

        if [ -z "$TAG" ]; then
          echo "No matching tag found for search: $SEARCH"
          echo "$RESPONSE" | jq .
          exit 1
        fi

        echo "Found tag: $TAG"
        echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"

    - name: Import image into ACR
      id: import
      shell: bash
      run: |
        set -euo pipefail

        ="${{ inputs.github_repo }}"
        IMAGE_TAG="${{ steps.get_tag.outputs.image_tag }}"

        az acr import \
          --name "${{ inputs.acr_name }}" \
          --source "ghcr.io/dfe-digital/${IMAGE_REPO}:${IMAGE_TAG}" \
          --image "${inputs.github_repo}:${IMAGE_TAG}" \
          --username "${{ github.actor }}" \
          --password "${{ github.token }}"

    - name: Get latest image tag
      id: image
      shell: bash
      run: |
        set -euo pipefail

        IMAGE_REPO="${{ inputs.github_repo }}"

        IMAGE_TAG=$(az acr repository show-tags \
          --name "${{ inputs.acr_name }}" \
          --repository "${IMAGE_REPO}" \
          --top 1 \
          --orderby time_desc \
          --output tsv)

        echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
