name: Terraform Platform
description: create the platform resources for app rg, acr and costing sa using terraform
inputs:
  environment:
    required: true
    description: x
  az_resource_group:
    required: true
    description: x
  tf_backend_resource_group:
    required: true
    description: x
  az_location:
    required: true
    description: x
  tf_container_name:
    required: true
    description: x
  tf_storage_acc_name:
    required: true
    description: x
  tf_keyfile_name:
    required: true
    description: x
  costings_name:
    required: true
    description: x


runs:
  using: composite
  steps: 
      - name: Terraform init
        id: init
        shell: bash
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.tf_backend_resource_group }}"  \
            -backend-config="storage_account_name=${{ inputs.tf_container_name }}"  \
            -backend-config="container_name=${{ inputs.tf_storage_acc_name }}"  \
            -backend-config="key=${{ inputs.tf_keyfile_name }}"

      - name: Terraform Apply (platform)
        shell: bash
        run: |
          terraform apply -auto-approve \
            -var="resource_group_name=${{ inputs.az_resource_group }}" \
            -var="location=${{ inputs.az_location }}" \
            -var="acr_name=${{ inputs.az_acr_name }}" \
            -var="environment=${{ inputs.environment }}" \
            -var="costings_name=${{ inputs.costings_name }}" \
            -var="product=plan-tech"
