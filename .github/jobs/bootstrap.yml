bootstrap:
  runs-on: ubuntu-22.04
  description: create the rg, storage and key vault for terraform backend
  permissions:
    id-token: write
    contents: read
  inputs:
    environment:
      required: true
    tf_backend_resource_group:
      required: true
    az_location:
      required: true
  secrets:
    az_tenant_id:
      required: true
    az_subscription_id:
      required: true
    az_client_id:
      required: true
    az_object_id: #object id of the object getting assigned the access policy?
      required: true
    
  steps:
    - uses: actions/checkout@v4

    - name: Login with AZ
      uses: ./.github/actions/azure-login
      with:
        az_tenant_id: ${{ secrets.az_tenant_id }}
        az_subscription_id: ${{ secrets.az_subscription_id }}
        az_client_id: ${{ secrets.az_client_id }}

    - name: Initialise Terraform backend
      run:  |
        chmod +x ./scripts/initialise-terraform-state-resources.sh
        ./scripts/initialise-terraform-state-resources.sh \
          -g "${{ inputs.tf_backend_resource_group }}" \
          -l "${{ inputs.az_location }}" \
          -s "${{ secrets.az_object_id }}" \
          -p "plan-tech" \
          -e "${{ inputs.environment }}"
