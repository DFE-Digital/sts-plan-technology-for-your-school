bootstrap:
  runs-on: ubuntu-22.04
  description: create the rg, storage and key vault for terraform backend
  permissions:
    id-token: write
    contents: read
  inputs:
    environment:
      required: true
    tf_backend_resource_group:
      required: true
    az_location:
      required: true
    tf_container_name:
      required: true
    tf_storage_acc_name:
      required: true
    tf_keyvault_name:
      required: true
  secrets:
    az_tenant_id:
      required: true
    az_subscription_id:
      required: true
    az_client_id:
      required: true
    az_object_id: #object id of the object getting assigned the access policy?
      required: true
    
  steps:
    - name: Initialise Terraform backend
      run:  |
        chmod +x ./scripts/initialise-terraform-state-resources.sh
        ./scripts/initialise-terraform-state-resources.sh \
          -g "${{ inputs.tf_backend_resource_group }}" \
          -l "${{ inputs.az_location }}" \
          -s "${{ secrets.az_object_id }}" \
          -p "plan-tech" \
          -e "${{ inputs.environment }}" \
          -k "${{ inputs.tf_keyvault_name }}"
          -c "${{ inputs.tf_container_name }}""
          -a "${{ inputs.tf_storage_acc_name }}"
