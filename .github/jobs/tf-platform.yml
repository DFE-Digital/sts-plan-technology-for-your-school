name: Terraform Platform

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      az_resource_group:
        required: true
        type: string
      tf_backend_resource_group:
        required: true
        type: string
      az_location:
        required: true
        type: string
      tf_container_name:
        required: true
      tf_storage_acc_name:
        required: true
      tf_keyfile_name:
        required: true
        type: string
      costings_name:
        required: true
        type: string


jobs:
  terraform-platform:
    name: Terraform Platform
    runs-on: ubuntu-22.04

    defaults:
      run:
        working-directory: terraform/platform

    outputs:
      acr_login_server: ${{ steps.outputs.outputs.acr_login_server }}
      resource_group_name: ${{ steps.outputs.outputs.resource_group_name }}

    steps:
      - name: Terraform init
        id: init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ inputs.tf_backend_resource_group }}"  \
            -backend-config="storage_account_name=${{ inputs.tf_container_name }}"  \
            -backend-config="container_name=${{ inputs.tf_storage_acc_name }}"  \
            -backend-config="key=${{ inputs.tf_keyfile_name }}"

      - name: Terraform Apply (platform)
        run: |
          terraform apply -auto-approve \
            -var="resource_group_name=${{ inputs.az_resource_group }}" \
            -var="location=${{ inputs.az_location }}" \
            -var="acr_name=${{ inputs.az_acr_name }}" \
            -var="environment=${{ inputs.environment }}" \
            -var="costings_name=${{ inputs.costings_name }}" \
            -var="product=plan-tech"
